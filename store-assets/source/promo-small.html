<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Small Promo</title>
    <style>
      * { box-sizing: border-box; }
      body { width: 440px; height: 280px; margin: 0; overflow: hidden; background: #172033; color: #f8fafc; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tile { position: relative; width: 100%; height: 100%; padding: 30px; background: radial-gradient(circle at 92% 12%, #1bc7b6 0, transparent 30%), linear-gradient(135deg, #172033, #0b4f74); }
      img { width: 62px; height: 62px; border-radius: 14px; box-shadow: 0 18px 38px rgba(0,0,0,.22); }
      h1 { margin: 28px 0 0; font-size: 36px; line-height: 1.02; letter-spacing: 0; }
      p { margin: 14px 0 0; width: 250px; color: #d9e6ef; font-size: 16px; line-height: 1.35; }
      .mark { position: absolute; right: 24px; bottom: 24px; width: 94px; height: 70px; border: 3px solid #2dd4bf; border-radius: 12px; background: rgba(45,212,191,.08); }
      .cursor { position: absolute; right: 24px; bottom: 12px; width: 48px; height: 48px; clip-path: polygon(8% 0, 92% 78%, 58% 82%, 42% 100%); background: #f8fafc; }
    </style>
  </head>
  <body>
    <div class="tile">
      <img src="../../icons/icon.svg" alt="">
      <h1>Visual website feedback</h1>
      <p>Select elements, add comments, and copy Markdown reports.</p>
      <div class="mark"></div>
      <div class="cursor"></div>
    </div>
  </body>
</html>
