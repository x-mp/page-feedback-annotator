<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Page Feedback Annotator - Select</title>
    <style>
      * { box-sizing: border-box; }
      body { width: 1280px; height: 800px; margin: 0; overflow: hidden; background: #f4f7fb; color: #18202f; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .frame { position: absolute; inset: 32px; border: 1px solid #d8e0eb; border-radius: 14px; background: #fbfcfe; box-shadow: 0 24px 70px rgba(19, 34, 56, .16); overflow: hidden; }
      .top { height: 58px; display: flex; align-items: center; gap: 14px; padding: 0 18px; border-bottom: 1px solid #d8e0eb; background: #eef2f7; }
      .dot { width: 12px; height: 12px; border-radius: 50%; background: #f87171; box-shadow: 20px 0 #fbbf24, 40px 0 #34d399; }
      .url { flex: 1; height: 34px; display: flex; align-items: center; padding: 0 16px; border: 1px solid #d3dce8; border-radius: 999px; background: #fff; color: #617084; font-size: 14px; }
      .page { position: relative; height: 710px; padding: 42px 54px; background: #fbfcfe; }
      .nav { height: 52px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e3e9f2; }
      .logo { width: 142px; height: 20px; border-radius: 6px; background: #172033; }
      .links { display: flex; gap: 16px; }
      .links span { width: 72px; height: 12px; border-radius: 99px; background: #d9e1eb; }
      .hero { display: grid; grid-template-columns: 1fr 420px; gap: 48px; padding-top: 54px; }
      h1 { width: 470px; margin: 0; font-size: 46px; line-height: 1.06; letter-spacing: 0; }
      .copy { width: 500px; height: 70px; margin-top: 22px; border-radius: 12px; background: linear-gradient(#e5ebf3 16px, transparent 0) 0 0/100% 26px; }
      .cta { width: 168px; height: 46px; margin-top: 28px; border-radius: 8px; background: #0f8f83; }
      .card { height: 370px; border: 1px solid #d8e0eb; border-radius: 12px; background: #f7fafc; box-shadow: 0 18px 45px rgba(15, 23, 42, .10); }
      .card-top { height: 180px; margin: 16px; border-radius: 10px; background: linear-gradient(135deg, #d8f5ef, #cbd5e1); }
      .card-lines { margin: 18px 16px; display: grid; gap: 12px; }
      .card-lines span { height: 14px; border-radius: 99px; background: #d9e1eb; }
      .card-lines span:nth-child(2) { width: 70%; }
      .selection { position: absolute; left: 86px; top: 178px; width: 500px; height: 226px; border: 3px solid #0f8f83; border-radius: 12px; background: rgba(15,143,131,.08); box-shadow: 0 0 0 5px rgba(15,143,131,.16); }
      .badge { position: absolute; left: 75px; top: 166px; min-width: 28px; height: 28px; padding: 0 8px; border-radius: 999px; background: #0f8f83; color: #fff; font-weight: 800; line-height: 28px; text-align: center; }
      .composer { position: absolute; left: 616px; top: 222px; width: 300px; padding: 10px; border: 1px solid #d8dee8; border-radius: 10px; background: #f9fafb; box-shadow: 0 18px 55px rgba(15, 23, 42, .24); }
      .composer-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 8px; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-weight: 800; }
      .composer-head button { width: 24px; height: 24px; border: 0; border-radius: 8px; background: #fee2e2; color: #991b1b; }
      .textarea { height: 84px; margin-top: 8px; padding: 10px; border: 1px solid #d8dee8; border-radius: 8px; background: #fff; color: #526070; font-size: 13px; line-height: 1.35; }
      .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
      .buttons span { height: 32px; border: 1px solid #d8dee8; border-radius: 8px; display: grid; place-items: center; color: #526070; font-size: 12px; }
      .buttons span:last-child { border-color: #0f8f83; background: #0f8f83; color: #fff; font-weight: 800; }
      .panel { position: absolute; right: 70px; bottom: 60px; width: 206px; border: 1px solid #d8dee8; border-radius: 8px; background: #f9fafb; box-shadow: 0 18px 55px rgba(15,23,42,.22); }
      .panel-actions { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 7px; }
      .panel-actions span { height: 30px; border: 1px solid #d8dee8; border-radius: 8px; background: #f8fafc; display: grid; place-items: center; color: #526070; font-size: 15px; }
      .panel-actions span:first-child { border-color: #0f8f83; background: #0f8f83; color: #fff; }
      .caption { position: absolute; left: 72px; bottom: 58px; max-width: 580px; font-size: 34px; line-height: 1.14; font-weight: 800; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="top"><div class="dot"></div><div class="url">https://example.com/landing-page</div></div>
      <div class="page">
        <div class="nav"><div class="logo"></div><div class="links"><span></span><span></span><span></span></div></div>
        <div class="hero">
          <div><h1>Example product page headline</h1><div class="copy"></div><div class="cta"></div></div>
          <div class="card"><div class="card-top"></div><div class="card-lines"><span></span><span></span><span></span></div></div>
        </div>
        <div class="selection"></div>
        <div class="badge">1</div>
        <div class="composer">
          <div class="composer-head"><span>Comment</span><button>x</button></div>
          <div class="textarea">Hero CTA needs stronger contrast and clearer action copy.</div>
          <div class="buttons"><span>Cancel</span><span>Save</span></div>
        </div>
        <div class="panel"><div class="panel-actions"><span>⧉</span><span>＋</span><span>⌫</span><span>⚙</span><span>×</span></div></div>
        <div class="caption">Click page elements and attach comments exactly where changes are needed.</div>
      </div>
    </div>
  </body>
</html>
