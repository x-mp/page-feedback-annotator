<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Marquee Promo</title>
    <style>
      * { box-sizing: border-box; }
      body { width: 1400px; height: 560px; margin: 0; overflow: hidden; background: #172033; color: #f8fafc; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tile { position: relative; width: 100%; height: 100%; padding: 64px 78px; background: radial-gradient(circle at 90% 14%, #1bc7b6 0, transparent 26%), linear-gradient(135deg, #172033 0%, #0b4f74 100%); }
      .brand { display: flex; align-items: center; gap: 18px; }
      img { width: 76px; height: 76px; border-radius: 18px; box-shadow: 0 18px 38px rgba(0,0,0,.25); }
      .brand strong { font-size: 28px; }
      h1 { margin: 54px 0 0; width: 710px; font-size: 72px; line-height: 1.02; letter-spacing: 0; }
      p { margin: 24px 0 0; width: 680px; color: #d9e6ef; font-size: 26px; line-height: 1.36; }
      .mock { position: absolute; right: 82px; top: 64px; width: 480px; height: 380px; border: 1px solid rgba(255,255,255,.18); border-radius: 18px; background: rgba(248,250,252,.94); box-shadow: 0 28px 80px rgba(0,0,0,.32); overflow: hidden; }
      .top { height: 42px; background: #e8eef5; border-bottom: 1px solid #cfd8e5; }
      .content { position: relative; height: 338px; padding: 34px; }
      .line { height: 18px; border-radius: 99px; background: #cfd8e5; margin-bottom: 16px; }
      .line.w1 { width: 300px; height: 34px; background: #172033; }
      .line.w2 { width: 360px; }
      .line.w3 { width: 230px; }
      .select { position: absolute; left: 32px; top: 78px; width: 350px; height: 132px; border: 4px solid #0f8f83; border-radius: 12px; background: rgba(15,143,131,.08); box-shadow: 0 0 0 6px rgba(15,143,131,.16); }
      .panel { position: absolute; right: 30px; bottom: 30px; width: 184px; height: 44px; border: 1px solid #d8dee8; border-radius: 8px; background: #f9fafb; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 6px; }
      .panel span { border-radius: 7px; background: #e9eef5; }
      .panel span:first-child { background: #0f8f83; }
      .cursor { position: absolute; right: 54px; bottom: 34px; width: 76px; height: 76px; clip-path: polygon(8% 0, 92% 78%, 58% 82%, 42% 100%); background: #111827; filter: drop-shadow(0 10px 10px rgba(0,0,0,.22)); }
    </style>
  </head>
  <body>
    <div class="tile">
      <div class="brand"><img src="../../icons/icon.svg" alt=""><strong>Page Feedback Annotator</strong></div>
      <h1>Collect precise website feedback</h1>
      <p>Select elements, attach comments, and copy structured Markdown for QA, UI review, developers, and AI agents.</p>
      <div class="mock"><div class="top"></div><div class="content"><div class="line w1"></div><div class="line w2"></div><div class="line w3"></div><div class="select"></div><div class="panel"><span></span><span></span><span></span><span></span><span></span></div><div class="cursor"></div></div></div>
    </div>
  </body>
</html>
